document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

scaleY(0.1); } }\n  @media (prefers-reduced-motion: reduce){ .kw-mark .blink{ animation:none; } }\n  h1,h2{ font-family: var(--serif); font-weight:400; letter-spacing:-0.01em; line-height:1.04; }\n  h1{ font-size: clamp(2.9rem, 11vw, 4.6rem); }\n  h2{ font-size: clamp(2rem, 7vw, 2.9rem); }\n  .lead{ font-size: clamp(1.08rem, 4.2vw, 1.3rem); color: var(--ink-soft); }\n\n  em.mark{ font-style: italic; color: var(--accent); }\n\n  /* ---------- buttons ---------- */\n  .btn{\n    font-family: var(--sans); font-size: 1.02rem; font-weight:600;\n    border:none; cursor:pointer; border-radius: 999px;\n    padding: 16px 28px; display:inline-flex; align-items:center; gap:10px;\n    transition: transform .14s ease, background .2s ease, box-shadow .2s ease;\n    text-decoration:none;\n  }\n  .btn-primary{\n    background: var(--accent); color: var(--paper);\n    box-shadow: 0 1px 0 oklch(0.45 0.15 38), 0 10px 24px -12px var(--accent);\n  }\n  .btn-primary:hover{ background: var(--accent-deep); transform: translateY(-1px); }\n  .btn-primary:active{ transform: translateY(0); }\n  .btn-primary svg{ width:18px; height:18px; }\n\n  .reassure{ font-size:0.92rem; color: var(--ink-soft); }\n\n  /* ---------- layout sections ---------- */\n  section{ padding: clamp(64px, 13vw, 110px) 0; }\n  .hero{ padding-top: clamp(72px, 16vw, 128px); padding-bottom: clamp(56px,12vw,96px); }\n  .divider{ height:1px; background: var(--line); width:100%; }\n\n  .hero h1{ margin-top: 22px; }\n  .hero .lead{ margin-top: 26px; max-width: 30ch; }\n  .hero .cta-row{ margin-top: 38px; display:flex; flex-direction:column; align-items:flex-start; gap:16px; }\n\n  .sec-label{ margin-bottom: 28px; }\n  .stmt{ font-family: var(--serif); font-size: clamp(1.5rem,5.5vw,2.05rem); line-height:1.22; letter-spacing:-0.01em; }\n  .stmt + .stmt{ margin-top: 18px; }\n  .sub{ color: var(--ink-soft); margin-top: 22px; max-width: 46ch; }\n\n  /* ---------- solution bullets ---------- */\n  .bullets{ margin-top: 34px; display:flex; flex-direction:column; gap:2px; }\n  .bullet{\n    display:grid; grid-template-columns: 36px 1fr; gap:18px; align-items:start;\n    padding: 22px 0; border-top:1px solid var(--line);\n  }\n  .bullet:last-child{ border-bottom:1px solid var(--line); }\n  .bullet .num{\n    font-family: var(--serif); font-size:1.5rem; color: var(--accent); line-height:1.1;\n  }\n  .bullet h3{ font-size:1.12rem; font-weight:600; margin-bottom:4px; }\n  .bullet p{ color: var(--ink-soft); font-size:0.99rem; }\n\n  /* ---------- founder ---------- */\n  .founder{ display:flex; gap:18px; align-items:flex-start; margin-top: 30px; }\n  .avatar{\n    flex:0 0 auto; width:52px; height:52px; border-radius:50%;\n    background: var(--accent-wash); color: var(--accent);\n    display:grid; place-items:center; font-family:var(--serif); font-size:1.5rem;\n    border:1px solid oklch(0.62 0.15 40 / 0.25);\n  }\n  .founder .who{ font-weight:600; }\n  .founder .role{ color: var(--ink-soft); font-size:0.92rem; }\n  .founder blockquote{\n    font-family: var(--serif); font-size: clamp(1.3rem,4.6vw,1.6rem);\n    line-height:1.3; letter-spacing:-0.01em; margin-bottom:16px;\n  }\n\n  /* ---------- signup ---------- */\n  .signup{ background: var(--paper-2); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }\n  .signup h2{ margin-top:18px; }\n  .signup .lead{ margin-top:16px; max-width:34ch; }\n  .form{ margin-top: 30px; display:flex; flex-direction:column; gap:12px; max-width:420px; }\n  .field-row{ display:flex; gap:10px; flex-wrap:wrap; }\n  .form input[type=email]{\n    flex:1 1 200px; min-width:0; font-family:var(--sans); font-size:1rem;\n    padding:15px 18px; border-radius:12px; border:1px solid var(--line);\n    background: var(--paper); color:var(--ink); transition:border .2s, box-shadow .2s;\n  }\n  .form input[type=email]:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash); }\n  .form .btn-primary{ padding:15px 24px; }\n  .form-note{ font-size:0.86rem; color:var(--ink-soft); }\n  .form-ok{ display:none; align-items:center; gap:10px; color:var(--accent-deep); font-weight:600; }\n  .form.done input, .form.done .submit{ display:none; }\n  .form.done .form-ok{ display:flex; }\n\n  .final-cta{ margin-top: 40px; display:flex; flex-direction:column; align-items:flex-start; gap:14px; }\n\n  footer{ padding: 40px 0 60px; }\n  .foot-row{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }\n  .logo{ font-family:var(--serif); font-size:1.35rem; }\n  .logo b{ color:var(--accent); font-weight:400; }\n  .foot-meta{ color:var(--ink-soft); font-size:0.86rem; }\n\n  /* ---------- TBD placeholder ---------- */\n  .tbd{\n    font-family: ui-monospace, \"SF Mono\", Menlo, monospace;\n    font-size: 0.82rem; line-height:1.45; color: var(--accent-deep);\n    background: var(--accent-wash);\n    border: 1.5px dashed var(--accent);\n    border-radius: 10px; padding: 12px 14px;\n    display:block;\n  }\n  .tbd .k{ font-weight:700; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; display:block; margin-bottom:4px; opacity:0.85; }\n  .tbd-inline{\n    font-family: ui-monospace, \"SF Mono\", Menlo, monospace;\n    font-size: 0.8em; color: var(--accent-deep);\n    background: var(--accent-wash); border:1.5px dashed var(--accent);\n    border-radius: 7px; padding: 2px 8px; white-space:nowrap;\n  }\n\n  /* ---------- scroll reveal ---------- */\n  .reveal{ opacity:0; transform: translateY(16px); transition: opacity .7s ease, transform .7s ease; }\n  .reveal.in{ opacity:1; transform:none; }\n  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1; transform:none; transition:none; } html{ scroll-behavior:auto; } }\n\n  /* ---------- toast ---------- */\n  #toast{\n    position: fixed; left:50%; bottom:28px; transform: translate(-50%, 20px);\n    background: var(--ink); color: var(--paper); font-size:0.92rem; font-weight:500;\n    padding: 12px 20px; border-radius: 999px; opacity:0; pointer-events:none;\n    transition: opacity .25s ease, transform .25s ease; z-index:50;\n    box-shadow: 0 12px 30px -12px oklch(0.245 0.012 60 / 0.5);\n  }\n  #toast.show{ opacity:1; transform: translate(-50%, 0); }\n\n  @media (min-width: 720px){\n    body{ font-size:18px; }\n    .hero .cta-row{ flex-direction:row; align-items:center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"background-color: rgb(241, 228, 228)\">\n\n  <!-- ============ HERO ============ -->\n  <section class=\"hero\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow eyebrow--brand reveal\">\n        <span class=\"kw-mark\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\">\n            <circle cx=\"16\" cy=\"16\" r=\"11\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\"><\u002Fcircle>\n            <g class=\"blink\" fill=\"var(--accent)\">\n              <circle cx=\"12\" cy=\"14.5\" r=\"1.7\"><\u002Fcircle>\n              <circle cx=\"20\" cy=\"14.5\" r=\"1.7\"><\u002Fcircle>\n            <\u002Fg>\n            <path d=\"M11.5 19.5 Q16 23.5 20.5 19.5\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        Knowho\n      <\u002Fp>\n      <h1 class=\"reveal\">Remember <em class=\"mark\">everyone<\u002Fem> you meet.<\u002Fh1>\n      <p class=\"lead reveal\">A simple web app that helps you remember the names, faces, and little details of every new person in your community — so the next hello feels like an old friend.<\u002Fp>\n      <div class=\"cta-row reveal\">\n        <button class=\"btn btn-primary\" data-share=\"\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><line x1=\"8.6\" y1=\"13.5\" x2=\"15.4\" y2=\"17.5\"><\u002Fline><line x1=\"15.4\" y1=\"6.5\" x2=\"8.6\" y2=\"10.5\"><\u002Fline><\u002Fsvg>\n          Share with one friend\n        <\u002Fbutton>\n        <span class=\"reassure\">30 seconds. One friend. That's the whole idea.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"wrap\"><div class=\"divider\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ PROBLEM ============ -->\n  <section>\n    <div class=\"wrap\">\n      <p class=\"eyebrow sec-label reveal\">The problem<\u002Fp>\n      <p class=\"stmt reveal\">Sometimes it's hard to remember a new person's name, or their habits, birthday, or the things you talked about.<\u002Fp>\n      <p class=\"stmt reveal\" style=\"color:var(--ink-soft)\">\n        <span class=\"tbd-inline\">[TBD]<\u002Fspan> Refine the second sentence — sharpen the friction.\n      <\u002Fp>\n      <div class=\"sub reveal\">\n        <span class=\"tbd\" style=\"max-width:46ch\">\n          <span class=\"k\">TBD · second sentence<\u002Fspan>\n          Suggestion to sharpen it: “And the moment you forget, the connection quietly slips away — the warm community you wanted starts to feel like a room full of strangers.” Tell me in chat and I'll drop it in.\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"wrap\"><div class=\"divider\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ SOLUTION ============ -->\n  <section>\n    <div class=\"wrap\">\n      <p class=\"eyebrow sec-label reveal\">How Knowho helps<\u002Fp>\n      <h2 class=\"reveal\">Three small habits.<br>Nobody forgotten.<\u002Fh2>\n      <div class=\"bullets reveal\">\n        <div class=\"bullet\">\n          <span class=\"num\">1<\u002Fspan>\n          <div>\n            <h3><span class=\"tbd-inline\">[TBD]<\u002Fspan> First way it solves the problem<\u002Fh3>\n            <p>One short line on the first benefit. e.g. “Jot a name and one detail the second you meet someone.” Send me the real copy in chat.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bullet\">\n          <span class=\"num\">2<\u002Fspan>\n          <div>\n            <h3><span class=\"tbd-inline\">[TBD]<\u002Fspan> Second way it solves the problem<\u002Fh3>\n            <p>One short line on the second benefit. e.g. “Knowho reminds you of birthdays and the topics they care about.”<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bullet\">\n          <span class=\"num\">3<\u002Fspan>\n          <div>\n            <h3><span class=\"tbd-inline\">[TBD]<\u002Fspan> Third way it solves the problem<\u002Fh3>\n            <p>One short line on the third benefit. e.g. “Walk into any gathering already knowing who's who.”<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"wrap\"><div class=\"divider\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ WHO'S BEHIND IT ============ -->\n  <section>\n    <div class=\"wrap\">\n      <p class=\"eyebrow sec-label reveal\">Who's behind it<\u002Fp>\n      <div class=\"founder reveal\">\n        <div class=\"avatar\">S<\u002Fdiv>\n        <div>\n          <blockquote>\n            <span class=\"tbd\" style=\"display:inline-block; font-family:ui-monospace,Menlo,monospace; font-size:0.95rem; line-height:1.5;\">\n              <span class=\"k\">TBD · founder line<\u002Fspan>\n              Add a short, personal line from Sarah — why you built this. e.g. “I kept forgetting the names of the wonderful people at my community center, so I built the tool I wished I had.”\n            <\u002Fspan>\n          <\u002Fblockquote>\n          <div class=\"who\">Sarah<\u002Fdiv>\n          <div class=\"role\">IT developer · building Knowho<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SIGN UP ============ -->\n  <section class=\"signup\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow sec-label reveal\">Be first to use it<\u002Fp>\n      <h2 class=\"reveal\">Get Knowho when it's ready.<\u002Fh2>\n      <p class=\"lead reveal\">Leave your email and you'll be the first to know. Then do the one thing that helps most:<\u002Fp>\n\n      <div class=\"reveal\" style=\"margin-top:24px; max-width:460px;\">\n        <span class=\"tbd\">\n          <span class=\"k\">TBD · sign-up method<\u002Fspan>\n          Email field below is a placeholder. Tell me in chat if you'd rather link out to a form (Tally, Google Form, a waitlist tool) and I'll swap it.\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <form class=\"form reveal\" id=\"signupForm\" novalidate=\"\">\n        <div class=\"field-row\">\n          <input type=\"email\" placeholder=\"you@email.com\" aria-label=\"Your email\" required=\"\">\n          <button type=\"submit\" class=\"btn btn-primary submit\">Notify me<\u002Fbutton>\n        <\u002Fdiv>\n        <span class=\"form-note\">No spam. One email when Knowho launches.<\u002Fspan>\n        <span class=\"form-ok\">\n          <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n          You're on the list. Now share it with one friend ↓\n        <\u002Fspan>\n      <\u002Fform>\n\n      <div class=\"final-cta reveal\">\n        <button class=\"btn btn-primary\" data-share=\"\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><line x1=\"8.6\" y1=\"13.5\" x2=\"15.4\" y2=\"17.5\"><\u002Fline><line x1=\"15.4\" y1=\"6.5\" x2=\"8.6\" y2=\"10.5\"><\u002Fline><\u002Fsvg>\n          Share with one friend\n        <\u002Fbutton>\n        <span class=\"reassure\">If one person finds their people because of you, that's a good day.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div class=\"wrap\">\n      <div class=\"foot-row\">\n        <span class=\"logo\">Know<b>who<\u002Fb><\u002Fspan>\n        <span class=\"foot-meta\">Remember everyone you meet.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <div id=\"toast\">Link copied — paste it to a friend<\u002Fdiv>\n\n  \n\n<script>\n  // ---- Share with one friend: native share sheet, copy-link fallback ----\n  const shareData = {\n    title: \"Knowho — remember everyone you meet\",\n    text: \"Knowho helps you remember the names, faces and little details of the new people you meet. Thought of you:\",\n    url: location.href\n  };\n  const toast = document.getElementById('toast');\n  let toastTimer;\n  function showToast(msg){\n    toast.textContent = msg;\n    toast.classList.add('show');\n    clearTimeout(toastTimer);\n    toastTimer = setTimeout(()=>toast.classList.remove('show'), 2600);\n  }\n  async function shareIt(){\n    try{\n      if(navigator.share){\n        await navigator.share(shareData);\n        return;\n      }\n    }catch(e){ /* user dismissed — fall through silently */\n      if(e && e.name === 'AbortError') return;\n    }\n    // fallback: copy link\n    try{\n      await navigator.clipboard.writeText(shareData.url);\n      showToast('Link copied — paste it to a friend');\n    }catch(e){\n      showToast('Copy this link: ' + shareData.url);\n    }\n  }\n  document.querySelectorAll('[data-share]').forEach(b=> b.addEventListener('click', shareIt));\n\n  // ---- Signup (placeholder behaviour) ----\n  const form = document.getElementById('signupForm');\n  form.addEventListener('submit', e=>{\n    e.preventDefault();\n    const input = form.querySelector('input[type=email]');\n    if(!input.value || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(input.value)){\n      input.focus();\n      input.style.borderColor = 'var(--accent)';\n      input.style.boxShadow = '0 0 0 3px var(--accent-wash)';\n      return;\n    }\n    form.classList.add('done');\n  });\n\n  // ---- Subtle fade-in on scroll ----\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });\n  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n  document.querySelectorAll('.reveal').forEach((el,i)=>{\n    el.style.transitionDelay = Math.min(i%4 * 60, 180) + 'ms';\n    io.observe(el);\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
